<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ananya's Wellness Sanctuary</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <header id="main-header">
            <h1>today's goals ✨</h1>
            <p id="date-display"></p>
        </header>

        <section id="dashboard" class="tab-content active">
            <div id="dashboard-content">
                <div class="wellness-card">
                    <small>DAILY AFFIRMATION</small>
                    <p id="affirmation-text">"Loading magic..."</p>
                </div>

                <div class="input-section">
                    <input type="text" id="todo-input" placeholder="What's the plan?">
                    <button id="add-btn">+</button>
                </div>
                
                <ul id="todo-list"></ul>
            </div>

            <div class="feature-grid">
                <div class="feature-item" onclick="showTab('focus-tab')"><span>🐰</span><small>Focus</small></div>
                <div class="feature-item" onclick="showTab('water-tab')"><span>🌱</span><small>Water</small></div>
                <div class="feature-item" onclick="showTab('journal-tab')"><span>🔒</span><small>Diary</small></div>
                <div class="feature-item" onclick="showTab('vision-tab')"><span>🖼️</span><small>Vision</small></div>
                <div class="feature-item" onclick="showTab('breathe-tab')"><span>🌬️</span><small>Breathe</small></div>
                <div class="feature-item" onclick="showTab('fitness-tab')"><span>👟</span><small>Fitness</small></div>
            </div>
        </section>

        <section id="focus-tab" class="tab-content">
            <button class="back-btn" onclick="showTab('dashboard')">← Back</button>
            <div class="glass-inner">
                <div class="display-circle"><span id="timer-clock">25:00</span></div>
                <div class="controls">
                    <button id="start-timer" class="main-btn">Start</button>
                    <button id="reset-timer" class="secondary-btn">Reset</button>
                </div>
            </div>
        </section>

        <section id="water-tab" class="tab-content">
            <button class="back-btn" onclick="showTab('dashboard')">← Back</button>
            <div class="glass-inner">
                <div class="display-circle"><div id="plant-display" style="font-size: 4rem;">🌱</div></div>
                <p>Glasses: <span id="water-count">0</span>/8</p>
                <div class="controls">
                    <button class="main-btn" style="background: #4db6ac;" onclick="addWater()">Drink 💧</button>
                    <button class="secondary-btn" onclick="resetWater()">Reset</button>
                </div>
            </div>
        </section>

        <section id="journal-tab" class="tab-content">
            <button class="back-btn" onclick="showTab('dashboard')">← Back</button>
            <div class="glass-inner">
                <div id="diary-lock">
                    <input type="password" id="diary-pin" placeholder="PIN" style="width: 80px; text-align: center;">
                    <button class="main-btn" style="background: #ba68c8; margin-top:10px;" onclick="unlockDiary()">Unlock</button>
                </div>
                <div id="diary-open" style="display: none; width: 100%;">
                    <textarea id="diary-input" placeholder="Thoughts..."></textarea>
                    <button class="main-btn" style="background: #ba68c8;" onclick="saveDiary()">Save</button>
                </div>
            </div>
        </section>

        <section id="vision-tab" class="tab-content">
            <button class="back-btn" onclick="showTab('dashboard')">← Back</button>
            <div class="glass-inner">
                <input type="text" id="vision-url" placeholder="Paste .jpg link...">
                <button class="main-btn" style="background: #ffb74d; margin-top: 10px;" onclick="addImage()">Add Image</button>
                <div id="vision-grid" class="vision-grid"></div>
            </div>
        </section>

        <section id="breathe-tab" class="tab-content">
            <button class="back-btn" onclick="showTab('dashboard')">← Back</button>
            <div class="glass-inner">
                <div class="breathe-circle"></div>
                <p id="breathe-text" style="font-weight: 600;">Ready?</p>
                <button class="main-btn" onclick="startBreathing()" id="breathe-btn" style="background: #90caf9;">Start</button>
            </div>
        </section>

        <section id="fitness-tab" class="tab-content">
            <button class="back-btn" onclick="showTab('dashboard')">← Back</button>
            <div class="glass-inner">
                <h2 style="color: #ff7043; margin-bottom: 10px;">movement log 👟</h2>
                <div class="progress-container">
                    <div id="step-progress" class="progress-bar"></div>
                </div>
                <p style="font-weight: 600;"><span id="current-steps">0</span> / 10,000 steps</p>
                <div class="input-section" style="margin-top:20px;">
                    <input type="number" id="step-input" placeholder="Steps...">
                    <button class="main-btn" style="background: #ff7043;" onclick="addSteps()">Add</button>
                </div>
                <button class="secondary-btn" onclick="resetSteps()" style="margin-top: 15px;">New Day</button>
            </div>
        </section>
        <div class="badges-row" id="badge-display">
        </div>

        <section id="fitness-tab" class="tab-content">
            <button class="back-btn" onclick="showTab('dashboard')">← Back</button>
            <div class="glass-inner">
                <h2 style="color: #ff7043;">movement log 👟</h2>
                <div class="progress-container"><div id="step-progress" class="progress-bar"></div></div>
                <p><span id="current-steps">0</span> / <input type="number" id="step-goal-input" class="inline-input" onchange="updateStepGoal()"> steps</p>
            </div>
        </section>   
    </div>
    <script src="script.js"></script>
</body>
</html>
