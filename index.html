<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ananya's Life Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <header id="main-header">
            <h1>today's goals ✨</h1>
            <p id="date-display"></p>
        </header>

        <section id="dashboard" class="tab-content active">
            <div id="dashboard-content">
                <div class="wellness-card">
                    <div id="badge-display" class="badges-row"></div>
                    <p id="affirmation-text">"Everything is falling into place. 🎀"</p>
                </div>

                <div class="big-three-container">
                    <small>DAILY BIG 3 ⚡</small>
                    <div class="big-three-inputs">
                        <input type="text" id="big1" placeholder="1. High Priority" onchange="saveBigThree()">
                        <input type="text" id="big2" placeholder="2. Important" onchange="saveBigThree()">
                        <input type="text" id="big3" placeholder="3. Must do" onchange="saveBigThree()">
                    </div>
                </div>

                <div class="lofi-widget">
                    <iframe width="100%" height="80" src="https://www.youtube.com/embed/jfKfPfyJRdk?controls=0" frameborder="0"></iframe>
                </div>

                <div class="oracle-container" onclick="flipCard()">
                    <div id="oracle-card" class="oracle-card">Flip for Taurus Guidance 🔮</div>
                </div>

                <div class="pill-input-section">
                    <input type="text" id="todo-input" placeholder="Quick tasks...">
                    <button id="add-btn">+</button>
                </div>
                <ul id="todo-list" class="task-grid"></ul>
            </div>

            <div class="feature-grid">
                <div class="feature-item" onclick="showTab('focus-tab')"><span>🐰</span><small>Focus</small></div>
                <div class="feature-item" onclick="showTab('water-tab')"><span>🌱</span><small>Water</small></div>
                <div class="feature-item" onclick="showTab('gratitude-tab')"><span>🏺</span><small>Jar</small></div>
                <div class="feature-item" onclick="showTab('sleep-tab')"><span>☁️</span><small>Sleep</small></div>
                <div class="feature-item" onclick="showTab('fitness-tab')"><span>👟</span><small>Fitness</small></div>
                <div class="feature-item" onclick="showTab('journal-tab')"><span>🔒</span><small>Diary</small></div>
            </div>

            <h3 class="grid-label">GLISSARA STUDIO & ECE</h3>
            <div class="feature-grid">
                <div class="feature-item" onclick="showTab('resin-tab')"><span>🎨</span><small>Orders</small></div>
                <div class="feature-item" onclick="showTab('baking-tab')"><span>🧁</span><small>Recipes</small></div>
                <div class="feature-item" onclick="showTab('degree-tab')"><span>🎓</span><small>Degree</small></div>
            </div>
        </section>

        <section id="gratitude-tab" class="tab-content"><button class="back-btn" onclick="showTab('dashboard')">← Back</button><div class="glass-inner">
            <div class="jar-visual">🏺</div><h2>Gratitude Jar</h2>
            <input type="text" id="gratitude-input" placeholder="I'm grateful for..."><button class="main-btn" onclick="addGratitude()">Drop in Jar</button>
            <div id="jar-notes" class="vision-grid"></div></div>
        </section>

        <section id="sleep-tab" class="tab-content"><button class="back-btn" onclick="showTab('dashboard')">← Back</button><div class="glass-inner">
            <h2>Sleep & Dreams ☁️</h2><input type="number" id="sleep-hours" placeholder="Hours Slept"><textarea id="dream-input" placeholder="Dream details..."></textarea>
            <button class="main-btn" onclick="saveSleep()">Log Night</button></div>
        </section>

        <section id="resin-tab" class="tab-content"><button class="back-btn" onclick="showTab('dashboard')">← Back</button><div class="glass-inner">
            <h2>Resin Orders 🎨</h2><div class="pill-input-section"><input type="text" id="order-name" placeholder="Name"><input type="text" id="order-item" placeholder="Item"><button class="main-btn" onclick="addOrder()">+</button></div>
            <ul id="order-list" class="order-grid"></ul></div>
        </section>

        </div>
    <script src="script.js"></script>
</body>
</html>
